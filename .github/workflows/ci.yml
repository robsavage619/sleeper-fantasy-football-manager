name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # setup-uv publishes full semver releases but only one floating major alias (v7),
      # so a bare @v8/@v9 does not resolve and the job dies before any step runs.
      # Pin an exact release and bump it deliberately.
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run pyright src/

      - name: Eval smoke run (tier 1, train split)
        run: uv run sffm eval run --tier 1 --split train
